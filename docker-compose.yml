version: "3.9"

services:

  bot:
    build: .
    command: python bot.py
    restart: always
    env_file: .env
    volumes:
      - db_data:/data
    depends_on: []
    networks:
      - internal

  web:
    build: .
    command: gunicorn --bind 0.0.0.0:5000 --workers 2 --timeout 60 app:app
    restart: always
    env_file: .env
    volumes:
      - db_data:/data
    ports:
      - "5000:5000"
    networks:
      - internal

volumes:
  db_data:
    driver: local

networks:
  internal:
    driver: bridge
