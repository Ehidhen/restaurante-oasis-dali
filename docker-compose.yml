services:

  bot:
    build: .
    command: python bot.py
    restart: always
    environment:
      - BOT_TOKEN=${BOT_TOKEN}
      - ADMIN_IDS=${ADMIN_IDS}
      - OASIS_SUPERVISOR_IDS=${OASIS_SUPERVISOR_IDS}
      - DALI_SUPERVISOR_IDS=${DALI_SUPERVISOR_IDS}
      - OASIS_CHIEF_IDS=${OASIS_CHIEF_IDS}
      - DALI_CHIEF_IDS=${DALI_CHIEF_IDS}
      - OASIS_CASHIER_IDS=${OASIS_CASHIER_IDS}
      - DALI_CASHIER_IDS=${DALI_CASHIER_IDS}
      - WEB_URL=${WEB_URL:-http://localhost:5000}
      - DB_PATH=${DB_PATH:-/data/restaurante.db}
      - COMPROBANTES_DIR=${COMPROBANTES_DIR:-/data/comprobantes}
      - FB_PAGE_SLUG=${FB_PAGE_SLUG:-OasisdeDali}
    volumes:
      - db_data:/data
    networks:
      - dokploy-network

  web:
    build: .
    command: gunicorn --bind 0.0.0.0:5000 --workers 2 --timeout 60 app:app
    restart: always
    environment:
      - BOT_TOKEN=${BOT_TOKEN}
      - ADMIN_IDS=${ADMIN_IDS}
      - OASIS_SUPERVISOR_IDS=${OASIS_SUPERVISOR_IDS}
      - DALI_SUPERVISOR_IDS=${DALI_SUPERVISOR_IDS}
      - OASIS_CHIEF_IDS=${OASIS_CHIEF_IDS}
      - DALI_CHIEF_IDS=${DALI_CHIEF_IDS}
      - OASIS_CASHIER_IDS=${OASIS_CASHIER_IDS}
      - DALI_CASHIER_IDS=${DALI_CASHIER_IDS}
      - WEB_URL=${WEB_URL:-http://localhost:5000}
      - DB_PATH=${DB_PATH:-/data/restaurante.db}
      - COMPROBANTES_DIR=${COMPROBANTES_DIR:-/data/comprobantes}
      - FB_PAGE_SLUG=${FB_PAGE_SLUG:-OasisdeDali}
    volumes:
      - db_data:/data
    networks:
      - dokploy-network

volumes:
  db_data:
    driver: local

networks:
  dokploy-network:
    external: true
